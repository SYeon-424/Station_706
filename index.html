  const frac = (Math.sin((t / mp.period) * Math.PI * 2) + 1) / 2;

  return { x, y, w: mp.w, h: mp.h };

function crumbleElapsed(c, t){
  const start = roomRowState.crumbleStart && roomRowState.crumbleStart[c.id];
  if(!start) return null;
  return t - start;
}
function crumbleIsSolid(c, t){
  const elapsed = crumbleElapsed(c, t);
  if(elapsed === null) return true;
  if(elapsed < c.warnMs) return true;
  if(elapsed < c.warnMs + c.fallMs) return false;
  return true;
}
function crumbleIsWarning(c, t){
  const elapsed = crumbleElapsed(c, t);
  return elapsed !== null && elapsed < c.warnMs;
}
function hazardActive(hz, t){
  const phase = (t % hz.period) / hz.period;
  return phase < hz.activeFraction;
}

let myPlayer = { x: START_POS.x, y: START_POS.y, vx:0, vy:0, onGround:false };

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function playBgm(){

  });
}
function stopBgm(){
  bgmRealPlayRequested = false;

}

// browsers only allow audio.play() reliably inside a direct user gesture.
// "둘 다 준비완료"는 나중에 비동기로(상대방 신호로) 오는 경우가 많아서 그 시점엔

// 미리 한 번 play()+즉시 pause()로 "잠금 해제"만 해둔다. 실제 재생은 이후 playBgm()에서.
let bgmRealPlayRequested = false; // true once the game has actually asked to play (not just the unlock priming)

function unlockBgm(){
  const bgm = document.getElementById('bgm');
  if(!bgm || bgm.dataset.unlocked) return;
  bgm.play().then(()=>{
    bgm.dataset.unlocked = '1';
    // if the real game-start playback already kicked in while this promise was
    // pending, do NOT pause it — that's exactly what caused the AbortError
    if(!bgmRealPlayRequested){
      bgm.pause();
      bgm.currentTime = 0;
    }
  }).catch(()=>{ /* still locked; playBgm() will just try again later */ });
}

function rectsOverlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

function isBridgeActive(bridge, myPos, remotePositions){
  if(bridge.mode === 'toggle'){
    return !!(roomRowState.bridgesOn && roomRowState.bridgesOn[bridge.id]);
  }
  const onIt = (pos)=> bridge.switchPads.some(pad => isOnPad(pos, pad));
  if(onIt(myPos)) return true;
  return Object.values(remotePositions).some(onIt);
}

function getActivePlatforms(bridgeStates, t){
  const lvl = L();
  const solids = [ ...lvl.grounds ];
  lvl.bridges.forEach(b=>{
    solids.push(...b.switchPads);
    if(bridgeStates[b.id]) solids.push(b.rect);
  });
  lvl.movingPlatforms.forEach((mp,idx)=>{
    const r = getMovingPlatformRect(mp, t);
    r.__mpIndex = idx;
    solids.push(r);
  });
  lvl.crumbles.forEach(c=>{
    if(crumbleIsSolid(c, t)) solids.push(c.rect);
  });
  lvl.launchPads.forEach(lp=>{
    solids.push(lp.padA, lp.padB);
  });
  lvl.gates.forEach(g=>{
    solids.push(g.plateA, g.plateB);
    const open = roomRowState.gatesOpen && roomRowState.gatesOpen[g.id];
    if(!open) solids.push({x:g.gateX, y:0, w:12, h: (lvl.height||400)-60});
  });
  return solids;
}

function stepPhysics(bridgeStates, t, dt){
  const p = myPlayer;
  const lvl = L();
  const sp = startPos();
  let moveX = 0;
  if(keys.has('ArrowLeft')||keys.has('KeyA')) moveX -= 1;
  if(keys.has('ArrowRight')||keys.has('KeyD')) moveX += 1;
  p.vx = moveX * MOVE_SPEED;
  if((keys.has('Space')||keys.has('ArrowUp')||keys.has('KeyW')) && p.onGround){ p.vy = JUMP_V; p.onGround = false; playSfx('sfxJump'); }
  p.vy += GRAVITY * dt;
  if(p.vy > 14) p.vy = 14;

  const solids = getActivePlatforms(bridgeStates, t);
  const box = ()=>({x:p.x-PW/2, y:p.y-PH, w:PW, h:PH});

  p.x += p.vx * dt;
  let b = box();
  for(const s of solids){
    if(rectsOverlap(b,s)){
      if(p.vx > 0) p.x = s.x - PW/2; else if(p.vx < 0) p.x = s.x + s.w + PW/2;
      b = box();
    }
  }
  p.y += p.vy * dt;
  b = box();
  const wasOnGround = p.onGround;
  p.onGround = false;
  lastLandedMpIndex = null;
  for(const s of solids){
    if(rectsOverlap(b,s)){
      if(p.vy > 0){
        if(!wasOnGround && p.vy > 3){ landingSquash = Math.min(1, p.vy / 14); spawnLandingBurst(p.x, s.y, '#4ade80', landingSquash); }
        p.y = s.y; p.onGround = true; p.vy = 0; if(s.__mpIndex !== undefined) lastLandedMpIndex = s.__mpIndex;
      }
      else if(p.vy < 0){ p.y = s.y + s.h + PH; p.vy = 0; }
      b = box();
    }
  }

  b = box();
  for(const hz of lvl.hazards){
    if(hazardActive(hz, t) && rectsOverlap(b, hz.rect)){
      p.x = sp.x; p.y = sp.y; p.vx = 0; p.vy = 0;
      break;
    }
  }

  if(p.y > killY()){ p.x = sp.x; p.y = sp.y; p.vx = 0; p.vy = 0; }
  if(p.y < PH) p.y = PH;
  if(p.x < PW/2) p.x = PW/2;
  if(p.x > lvl.width - PW/2) p.x = lvl.width - PW/2;
}

function isOnPad(pos, rect){
  return pos.x > rect.x && pos.x < rect.x+rect.w && pos.y >= rect.y-5 && pos.y <= rect.y+5;
}

const PIXEL_SIZES = [3, 4, 5, 6]; // discrete sizes so trail reads as blocky pixels, not smooth dots
function spawnTrailParticle(x, y, colorHex){
  if(particles.length > 220) particles.splice(0, particles.length - 220);
  const grid = 2; // snap to a small grid for a chunkier, less "smooth" look
  particles.push({
    x: Math.round((x + (Math.random()-0.5)*8) / grid) * grid,
    y: Math.round((y - 2 + (Math.random()-0.5)*5) / grid) * grid,
    vx: (Math.random()-0.5)*0.5,
    vy: -0.12 - Math.random()*0.18,
    life: 1,
    decay: 0.022 + Math.random()*0.018,
    size: PIXEL_SIZES[Math.floor(Math.random()*PIXEL_SIZES.length)],
    color: colorHex
  });
}
function spawnLandingBurst(x, y, colorHex, intensity){
  intensity = Math.max(0.15, Math.min(1, intensity));
  const count = 5 + Math.round(intensity * 5);
  for(let i = 0; i < count; i++){
    const dir = i % 2 === 0 ? 1 : -1;
    const spread = 0.3 + Math.random()*0.5;
    particles.push({
      x: x + dir * (2 + Math.random()*2),
      y: y - 1,
      vx: dir * spread * (0.5 + intensity * 0.6),
      vy: -0.15 - Math.random() * 0.25 * intensity,
      life: 1,
      decay: 0.06 + Math.random()*0.03,
      size: PIXEL_SIZES[Math.floor(Math.random()*PIXEL_SIZES.length)],
      color: colorHex
    });
  }
  if(particles.length > 220) particles.splice(0, particles.length - 220);
}
function updateAndDrawParticles(dt){
  const wasSmoothing = ctx.imageSmoothingEnabled;
  ctx.imageSmoothingEnabled = false; // keep the squares crisp/blocky, no anti-aliasing blur
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    if(p.life <= 0){ particles.splice(i, 1); continue; }
    // shrink in whole-pixel steps instead of smoothly, so it still reads as "pixels" while fading
    const steppedLife = Math.ceil(p.life * 4) / 4;
    const s = Math.max(1, Math.round(p.size * steppedLife));
    ctx.globalAlpha = Math.max(0, p.life) * 0.7;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x - s/2), Math.round(p.y - s/2), s, s);
  }
  ctx.globalAlpha = 1;
  ctx.imageSmoothingEnabled = wasSmoothing;
}

function drawPlayer(x,y,color,label,squash){
  squash = squash || 0;
  const w = PW * (1 + squash * 0.35);
  const h = PH * (1 - squash * 0.28);
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.fillRect(x-w/2, y-h, w, h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#050810';
  ctx.fillRect(x-6, y-h+8, 4,4); ctx.fillRect(x+2, y-h+8, 4,4);
  ctx.fillStyle = '#c7d1d9'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(label, x, y-PH-6); ctx.textAlign = 'left';
}

function drawLevel(remotePositions, bridgeStates, t, dt){
  const lvl = L();
  const h = lvl.height || 400;
  ctx.clearRect(0,0,lvl.width,h);
  ctx.strokeStyle = 'rgba(74,222,128,0.05)';
  for(let x=0;x<lvl.width;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }

  ctx.fillStyle = '#141b24'; ctx.strokeStyle = '#2f6b47'; ctx.lineWidth = 1.5;
  lvl.grounds.forEach(r=>{ ctx.fillRect(r.x,r.y,r.w,r.h); ctx.strokeRect(r.x,r.y,r.w,r.h); });

  lvl.bridges.forEach(bridge=>{
    const active = bridgeStates[bridge.id];
    if(active){
      ctx.fillStyle = 'rgba(74,222,128,0.18)'; ctx.strokeStyle = '#4ade80';
      ctx.fillRect(bridge.rect.x,bridge.rect.y,bridge.rect.w,bridge.rect.h);
      ctx.strokeRect(bridge.rect.x,bridge.rect.y,bridge.rect.w,bridge.rect.h);
    } else {
      ctx.strokeStyle = 'rgba(245,165,36,0.4)'; ctx.setLineDash([4,4]);
      ctx.strokeRect(bridge.rect.x,bridge.rect.y,bridge.rect.w,bridge.rect.h); ctx.setLineDash([]);
    }
    bridge.switchPads.forEach(pad=>{
      ctx.fillStyle = active ? '#4ade80' : '#f5a524';
      ctx.fillRect(pad.x,pad.y,pad.w,pad.h);
      ctx.fillStyle = '#c7d1d9'; ctx.font = '9px monospace';
      ctx.fillText(bridge.mode === 'hold' ? 'HOLD' : 'SWITCH', pad.x, pad.y-4);
    });
  });

  lvl.movingPlatforms.forEach(mp=>{
    const r = getMovingPlatformRect(mp, t);
    ctx.fillStyle = 'rgba(125,211,252,0.2)'; ctx.strokeStyle = '#7dd3fc';
    ctx.fillRect(r.x,r.y,r.w,r.h); ctx.strokeRect(r.x,r.y,r.w,r.h);
  });

  lvl.crumbles.forEach(c=>{
    const solidNow = crumbleIsSolid(c, t);
    const warning = crumbleIsWarning(c, t);
    if(solidNow){
      ctx.fillStyle = warning ? 'rgba(227,72,72,0.5)' : 'rgba(245,165,36,0.3)';
      ctx.strokeStyle = warning ? '#e34848' : '#f5a524';
      ctx.fillRect(c.rect.x,c.rect.y,c.rect.w,c.rect.h);
      ctx.strokeRect(c.rect.x,c.rect.y,c.rect.w,c.rect.h);
    } else {
      ctx.strokeStyle = 'rgba(138,152,168,0.35)'; ctx.setLineDash([3,3]);
      ctx.strokeRect(c.rect.x,c.rect.y,c.rect.w,c.rect.h); ctx.setLineDash([]);
    }
  });

  lvl.hazards.forEach(hz=>{
    const active = hazardActive(hz, t);
    ctx.fillStyle = active ? 'rgba(227,72,72,0.5)' : 'rgba(227,72,72,0.1)';
    ctx.strokeStyle = active ? '#e34848' : 'rgba(227,72,72,0.35)';
    ctx.fillRect(hz.rect.x,hz.rect.y,hz.rect.w,hz.rect.h);
    ctx.strokeRect(hz.rect.x,hz.rect.y,hz.rect.w,hz.rect.h);
  });

  lvl.launchPads.forEach(lp=>{
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(lp.padA.x,lp.padA.y,lp.padA.w,lp.padA.h);
    ctx.fillRect(lp.padB.x,lp.padB.y,lp.padB.w,lp.padB.h);
    ctx.fillStyle = '#c7d1d9'; ctx.font = '9px monospace';
    ctx.fillText('LAUNCH', lp.padA.x, lp.padA.y-4);
    ctx.fillText('LAUNCH', lp.padB.x, lp.padB.y-4);
  });

  lvl.gates.forEach(g=>{
    const open = roomRowState.gatesOpen && roomRowState.gatesOpen[g.id];
    ctx.fillStyle = open ? '#4ade80' : '#f5a524';
    ctx.fillRect(g.plateA.x,g.plateA.y,g.plateA.w,g.plateA.h);
    ctx.fillRect(g.plateB.x,g.plateB.y,g.plateB.w,g.plateB.h);
    ctx.fillStyle = '#c7d1d9'; ctx.font='9px monospace';
    ctx.fillText('A', g.plateA.x+g.plateA.w/2-3, g.plateA.y-4);
    ctx.fillText('B', g.plateB.x+g.plateB.w/2-3, g.plateB.y-4);

    const wallH = (lvl.height||400) - 60;
    ctx.fillStyle = open ? 'rgba(74,222,128,0.12)' : 'rgba(227,72,72,0.22)';
    ctx.fillRect(g.gateX, 0, 12, wallH);
    ctx.strokeStyle = open ? '#4ade80' : '#e34848';
    ctx.strokeRect(g.gateX, 0, 12, wallH);
  });

  if(Math.random() < 0.75) spawnTrailParticle(myPlayer.x, myPlayer.y, '#4ade80');
  Object.values(remotePositions).forEach(pos=>{
    if(Math.random() < 0.75) spawnTrailParticle(pos.x, pos.y, '#f5a524');
  });
  updateAndDrawParticles(dt || 1);

  Object.entries(remotePositions).forEach(([name,pos])=>drawPlayer(pos.x, pos.y, '#f5a524', name));
  drawPlayer(myPlayer.x, myPlayer.y, '#4ade80', myName, landingSquash);
  landingSquash *= Math.pow(0.8, dt || 1); // decay the squash back to normal over a few frames
  if(landingSquash < 0.02) landingSquash = 0;
}

const RENDER_DELAY = 55;
const MAX_EXTRAPOLATE = 150;

function getInterpolatedRemotePositions(){
  const renderTime = Date.now() - RENDER_DELAY;
  const out = {};
  Object.entries(lastRemoteSnapshots).forEach(([name, buf])=>{
    if(buf.length === 0) return;
    if(buf.length === 1){ out[name] = {x:buf[0].x, y:buf[0].y}; return; }

    if(renderTime <= buf[0].t){ out[name] = {x:buf[0].x, y:buf[0].y}; return; }

    const last = buf[buf.length-1];
    if(renderTime >= last.t){
      const prev = buf[buf.length-2];
      const dt = (last.t - prev.t) || 1;
      const vx = (last.x - prev.x) / dt;
      const vy = (last.y - prev.y) / dt;
      const overshoot = Math.min(renderTime - last.t, MAX_EXTRAPOLATE);
      out[name] = { x: last.x + vx*overshoot, y: last.y + vy*overshoot };
      return;
    }

    let a = buf[0], b = buf[buf.length-1];
    for(let i=0;i<buf.length-1;i++){
      if(buf[i].t <= renderTime && buf[i+1].t >= renderTime){ a = buf[i]; b = buf[i+1]; break; }
    }
    const span = (b.t - a.t) || 1;
    const t = Math.max(0, Math.min(1, (renderTime - a.t) / span));
    out[name] = { x: a.x + (b.x-a.x)*t, y: a.y + (b.y-a.y)*t };
  });
  return out;
}

let lastFrameTime = null;

function updateOxygenBar(remainingMs){
  const inner = document.getElementById('oxyBarInner');
  const text = document.getElementById('oxyTimeText');
  if(!inner || !text) return;
  const frac = Math.max(0, Math.min(1, remainingMs / OXYGEN_TOTAL_MS));
  inner.style.width = (frac*100).toFixed(1) + '%';
  let color = 'var(--green)';
  if(frac <= 0.2) color = 'var(--red)';
  else if(frac <= 0.45) color = 'var(--amber)';
  inner.style.background = color;
  inner.classList.toggle('critical', frac <= 0.2);
  const totalSec = Math.max(0, Math.ceil(remainingMs/1000));
  const mm = Math.floor(totalSec/60).toString().padStart(2,'0');
  const ss = (totalSec%60).toString().padStart(2,'0');
  text.textContent = `${mm}:${ss}`;
  text.style.color = color;
}

function gameLoop(){
  if(gamePhase !== 'playing') return;
  const lvl = L();
  const t = Date.now();
  let dt = lastFrameTime ? (t - lastFrameTime) / 16.6667 : 1;
  dt = Math.max(0.2, Math.min(2.5, dt));
  lastFrameTime = t;
  const preview = getInterpolatedRemotePositions();

  if(roomRowState.startTime){
    const remainingMs = OXYGEN_TOTAL_MS - (t - roomRowState.startTime);
    updateOxygenBar(remainingMs);
    if(remainingMs <= 0 && !oxygenTriggerSent && !roomRowState.dead && !roomRowState.won){
      oxygenTriggerSent = true;
      db.ref(`rooms/${roomCode}/state`).transaction(current=>{
        if(!current) return current;
        if(current.dead || current.won) return current;
        current.dead = true;
        current.deathReason = 'oxygen';
        return current;
      });
    }
  }

  const bridgeStates = {};
  lvl.bridges.forEach(b=>{ bridgeStates[b.id] = isBridgeActive(b, myPlayer, preview); });

  if(riddenMpIndex !== null && lvl.movingPlatforms[riddenMpIndex]){
    const mp = lvl.movingPlatforms[riddenMpIndex];
    const isVertical = mp.x0 === mp.x1;
    if(isVertical){
      const newRect = getMovingPlatformRect(mp, t);
      if(riddenMpPrevRect){
        myPlayer.x += newRect.x - riddenMpPrevRect.x;
        myPlayer.y += newRect.y - riddenMpPrevRect.y;
      }
      riddenMpPrevRect = newRect;
      myPlayer.onGround = true;
    } else {
      riddenMpPrevRect = null;
    }
  } else {
    riddenMpPrevRect = null;
  }

  stepPhysics(bridgeStates, t, dt);
  riddenMpIndex = lastLandedMpIndex;

  lvl.bridges.forEach(b=>{
    if(b.mode === 'toggle' && b.switchPads.some(pad=>isOnPad(myPlayer,pad)) && !(roomRowState.bridgesOn && roomRowState.bridgesOn[b.id])){
      db.ref(`rooms/${roomCode}/state/bridgesOn/${b.id}`).set(true);
      roomRowState.bridgesOn = roomRowState.bridgesOn || {};
      roomRowState.bridgesOn[b.id] = true;
    }
  });

  const remote = getInterpolatedRemotePositions();

  lvl.crumbles.forEach(c=>{
    if(!isOnPad(myPlayer, c.rect)) return;
    if(!crumbleIsSolid(c, t)) return;
    const elapsed = crumbleElapsed(c, t);
    const freshOrRespawned = elapsed === null || elapsed >= (c.warnMs + c.fallMs);
    if(freshOrRespawned){
      db.ref(`rooms/${roomCode}/state/crumbleStart/${c.id}`).set(t);
      roomRowState.crumbleStart = roomRowState.crumbleStart || {};
      roomRowState.crumbleStart[c.id] = t;
    }
  });

  const LAUNCH_GRACE_MS = 400;
  lvl.launchPads.forEach(lp=>{
    const iOnA = isOnPad(myPlayer, lp.padA), iOnB = isOnPad(myPlayer, lp.padB);
    const iOnEither = iOnA || iOnB;
    if(iOnA) localPadTouch[lp.id+':A'] = t;
    if(iOnB) localPadTouch[lp.id+':B'] = t;
    const myRecentA = localPadTouch[lp.id+':A'] && (t - localPadTouch[lp.id+':A']) <= LAUNCH_GRACE_MS;
    const myRecentB = localPadTouch[lp.id+':B'] && (t - localPadTouch[lp.id+':B']) <= LAUNCH_GRACE_MS;

    let otherRecentA=false, otherRecentB=false;
    Object.entries(lastRemoteSnapshots).forEach(([name, buf])=>{
      buf.forEach(s=>{
        if((t - s.t) > LAUNCH_GRACE_MS) return;
        if(isOnPad(s, lp.padA)) otherRecentA = true;
        if(isOnPad(s, lp.padB)) otherRecentB = true;
      });
    });

    const bothCovered = (myRecentA && otherRecentB) || (myRecentB && otherRecentA);
    if(!iOnEither){ launchArmed[lp.id] = true; }

    if(pendingLaunchFire[lp.id]){
      delete pendingLaunchFire[lp.id];
      if(iOnEither){
        myPlayer.vy = lp.boost;
        myPlayer.onGround = false;
      }
    }

    if(bothCovered && iOnEither && launchArmed[lp.id] !== false){
      launchArmed[lp.id] = false;
      db.ref(`rooms/${roomCode}/state/launchFire/${lp.id}`).set(t);
    }
  });

  lvl.gates.forEach(g=>{
    const already = roomRowState.gatesOpen && roomRowState.gatesOpen[g.id];
    if(already) return;
    const iOnA = isOnPad(myPlayer, g.plateA), iOnB = isOnPad(myPlayer, g.plateB);
    let otherOnA=false, otherOnB=false;
    Object.values(remote).forEach(pos=>{
      if(isOnPad(pos, g.plateA)) otherOnA = true;
      if(isOnPad(pos, g.plateB)) otherOnB = true;
    });
    const bothCovered = (iOnA && otherOnB) || (iOnB && otherOnA);
    if(bothCovered){
      db.ref(`rooms/${roomCode}/state/gatesOpen/${g.id}`).set(true);
      roomRowState.gatesOpen = roomRowState.gatesOpen || {};
      roomRowState.gatesOpen[g.id] = true;
    }
  });

  const finalGate = lvl.gates[lvl.gates.length-1];
  const finalOpen = !!(roomRowState.gatesOpen && roomRowState.gatesOpen[finalGate.id]);
  const otherNames = Array.from(onlineNames).filter(n => n !== myName);
  const iAmPastGate = myPlayer.x > finalGate.gateX - 4;
  const othersPastGate = otherNames.length === 0 || otherNames.every(name=>{
    const pos = remote[name];
    return pos && pos.x > finalGate.gateX - 4;
  });
  const cleared = finalOpen && iAmPastGate && othersPastGate;
  const isLastLevel = currentLevel >= LEVELS.length - 1;
  const banner = document.getElementById('clearBanner');

  if(cleared && !advancing){
    advancing = true;
    if(banner){
      banner.innerHTML = isLastLevel
        ? `<div class="clear-banner">ALL CLEAR!<br><span style="font-size:12px;color:#8a98a8;">탈출 포드로 진입 중...</span></div>`
        : `<div class="clear-banner">STAGE CLEAR!<br><span style="font-size:12px;color:#8a98a8;">다음 구역으로 이동 중...</span></div>`;
    }
    if(isLastLevel){
      db.ref(`rooms/${roomCode}/state`).transaction(current=>{
        if(!current) return current;
        if(current.dead || current.won) return current;
        current.won = true;
        return current;
      });
    } else {
      const sourceLevel = currentLevel;
      setTimeout(()=>{
        db.ref(`rooms/${roomCode}/state`).transaction(current=>{
          if(!current) return defaultRoomState();
          if((current.level||0) !== sourceLevel) return current;
          current.level = sourceLevel+1;
          current.bridgesOn = {};
          current.gatesOpen = {};
          current.crumbleStart = {};
          return current;
        });
      }, 1400);
    }
  } else if(!cleared && !advancing && banner){
    banner.innerHTML = '';
  }

  drawLevel(remote, bridgeStates, t, dt);
  rafId = requestAnimationFrame(gameLoop);
}

function setupMobileControls(){
  const bind = (id, code)=>{
    const el = document.getElementById(id);
    if(!el) return;
    const press = (e)=>{ e.preventDefault(); keys.add(code); };
    const release = (e)=>{ e.preventDefault(); keys.delete(code); };
    el.addEventListener('pointerdown', press);
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', release);
  };
  bind('mcLeft', 'ArrowLeft');
  bind('mcRight', 'ArrowRight');
  bind('mcJump', 'Space');
}

async function shareResult(won){
  const stageInfo = won ? '10/10 스테이지 전부 클리어' : `스테이지 ${currentLevel+1}/10에서 실패`;
  const text = won
    ? `🚀 정거장 706 탈출 성공! 산소가 다하기 전에 ${stageInfo}하고 무사히 빠져나왔다.`
    : `💀 정거장 706... 우리는 거기 남았다. (${stageInfo})`;
  const shareData = { title: '정거장 706', text, url: location.href };
  if(navigator.share){
    try{ await navigator.share(shareData); }catch(e){ /* 사용자가 취소한 경우도 여기로 옴 — 무시 */ }
  } else {
    const fullText = `${text}\n${location.href}`;
    try{
      await navigator.clipboard.writeText(fullText);
      alert('결과가 클립보드에 복사됐어요. 원하는 곳에 붙여넣기 해보세요!');
    }catch(e){
      prompt('아래 내용을 복사해서 공유하세요:', fullText);
    }
  }
}

function applyLevelReset(lvl){
  currentLevel = Math.max(0, Math.min(LEVELS.length-1, lvl));
  advancing = false;
  launchArmed = {};
  localPadTouch = {};
  landingSquash = 0;
  riddenMpIndex = null;
  riddenMpPrevRect = null;
  lastFrameTime = null;
  pendingLaunchFire = {};
  lastSeenLaunchTs = {};
  particles = [];
  const sp = startPos();
  myPlayer.x = sp.x; myPlayer.y = sp.y; myPlayer.vx = 0; myPlayer.vy = 0;
  updateStageIndicator();
  if(canvas){ canvas.width = L().width; canvas.height = L().height; }
  const banner = document.getElementById('clearBanner');
  if(banner) banner.innerHTML = '';
}

// If I'm the only one left in the room, arrange for the WHOLE room to be wiped
// the moment I disconnect (even by just closing the tab, not clicking "나가기").
// If someone else is around, only my own presence entry should disappear when I go.
// Re-evaluated every time the player list changes, on every connected client.
function updatePresenceCleanupStrategy(){
  if(!db || !roomCode || !myPlayerRef) return;
  if(onlineNames.size <= 1){
    db.ref(`rooms/${roomCode}`).onDisconnect().remove();
  } else {
    db.ref(`rooms/${roomCode}`).onDisconnect().cancel();
    myPlayerRef.onDisconnect().remove();
  }
}

function setupRealtime(){
  myPlayerRef = db.ref(`rooms/${roomCode}/players/${myName}`);
  myPlayerRef.onDisconnect().remove();

  realtimeRefs.players = db.ref(`rooms/${roomCode}/players`);
  realtimeRefs.players.on('value', (snap)=>{
    const val = snap.val() || {};
    onlineNames = new Set(Object.keys(val));
    updatePlayerChips();
    if(gamePhase === 'briefing') renderReadyList();
    Object.entries(val).forEach(([name, pos])=>{
      if(name === myName) return;
      const t = Date.now();
      if(!lastRemoteSnapshots[name]) lastRemoteSnapshots[name] = [];
      const arr = lastRemoteSnapshots[name];
      arr.push({x:pos.x, y:pos.y, t});
      if(arr.length > 8) arr.shift();
    });
    if(gamePhase === 'briefing') maybeLaunchGame();
    updatePresenceCleanupStrategy();
  });

  realtimeRefs.state = db.ref(`rooms/${roomCode}/state`);
  realtimeRefs.state.on('value', (snap)=>{
    const val = snap.val();
    if(!val) return;
    const prevGatesOpen = roomRowState.gatesOpen || {};
    const nextGatesOpen = val.gatesOpen || {};
    if(gamePhase === 'playing'){
      Object.keys(nextGatesOpen).forEach(gid=>{
        if(nextGatesOpen[gid] && !prevGatesOpen[gid]) playSfx('sfxOpen');
      });
    }
    roomRowState.bridgesOn = val.bridgesOn || {};
    roomRowState.gatesOpen = nextGatesOpen;
    roomRowState.crumbleStart = val.crumbleStart || {};
    roomRowState.ready = val.ready || {};
    roomRowState.gameStarted = !!val.gameStarted;
    roomRowState.startTime = val.startTime || null;
    roomRowState.dead = !!val.dead;
    roomRowState.deathReason = val.deathReason || null;
    roomRowState.won = !!val.won;

    let newPhase = 'briefing';
    if(roomRowState.dead) newPhase = 'dead';
    else if(roomRowState.won) newPhase = 'won';
    else if(roomRowState.gameStarted) newPhase = 'playing';

    if(newPhase !== gamePhase){
      const prevPhase = gamePhase;
      gamePhase = newPhase;
      if(prevPhase === 'playing' && rafId){ cancelAnimationFrame(rafId); rafId = null; }

      if(newPhase === 'briefing'){
        oxygenTriggerSent = false;
        removeOverlay();
        stopBgm();
        renderBriefing();
      } else if(newPhase === 'playing'){
        removeOverlay();
        oxygenTriggerSent = false;
        const lvl = typeof val.level === 'number' ? val.level : 0;
        renderShell();
        applyLevelReset(lvl);
        updatePlayerChips();
        playBgm();
        gameLoop();
      } else if(newPhase === 'dead'){
        stopBgm();
        renderDeathOverlay();
      } else if(newPhase === 'won'){
        stopBgm();
        renderWinOverlay();
      }
      return;
    }

    if(gamePhase === 'briefing'){
      renderReadyList();
      maybeLaunchGame();
    } else if(gamePhase === 'playing'){
      const lvl = typeof val.level === 'number' ? val.level : 0;
      if(lvl !== currentLevel) applyLevelReset(lvl);
    }
  });

  realtimeRefs.launchFire = db.ref(`rooms/${roomCode}/state/launchFire`);
  realtimeRefs.launchFire.on('value', (snap)=>{
    const val = snap.val() || {};
    Object.entries(val).forEach(([padId, ts])=>{
      if(lastSeenLaunchTs[padId] === ts) return;
      lastSeenLaunchTs[padId] = ts;
      pendingLaunchFire[padId] = true;
    });
  });

  realtimeRefs.connected = db.ref('.info/connected');
  realtimeRefs.connected.on('value', (snap)=>{
    const pill = document.getElementById('statusPill');
    if(!pill) return;
    if(snap.val() === true){ pill.textContent = '연결됨'; pill.className = 'status-pill connected'; }
    else { pill.textContent = '연결 중...'; pill.className = 'status-pill pending'; }
  });

  posSendTimer = setInterval(()=>{
    myPlayerRef.set({ x: Math.round(myPlayer.x), y: Math.round(myPlayer.y), ts: Date.now() });
  }, 40);
}

function teardownRealtime(){
  Object.values(realtimeRefs).forEach(ref=>{ try{ ref.off(); }catch(e){} });
  realtimeRefs = {};
  if(posSendTimer){ clearInterval(posSendTimer); posSendTimer = null; }
  if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
}

async function leaveRoom(){
  if(!db || !roomCode){ renderLogin(); return; }
  stopBgm();
  const leavingCode = roomCode;
  try{
    await db.ref(`rooms/${leavingCode}`).onDisconnect().cancel();
    if(myPlayerRef){ await myPlayerRef.onDisconnect().cancel(); await myPlayerRef.remove(); }
  }catch(e){ console.error(e); }
  try{
    const snap = await db.ref(`rooms/${leavingCode}/players`).once('value');
    const remaining = snap.val() || {};
    if(Object.keys(remaining).length === 0){
      await db.ref(`rooms/${leavingCode}`).remove();
    }
  }catch(e){ console.error(e); }

  teardownRealtime();
  gamePhase = 'briefing';
  oxygenTriggerSent = false;
  onlineNames = new Set();
  lastRemoteSnapshots = {};
  roomRowState = defaultRoomState();
  myName = ""; roomCode = "";
  myPlayerRef = null;
  removeOverlay();
  renderLogin();
}

function setupKeys(){
  window.addEventListener('keydown', e=>{
    if(e.code === 'KeyR' && gamePhase === 'briefing'){ toggleMyReady(); return; }
    if(['ArrowLeft','ArrowRight','ArrowUp','Space','KeyA','KeyD','KeyW'].includes(e.code)) e.preventDefault();
    keys.add(e.code);
  });
  window.addEventListener('keyup', e=>{ keys.delete(e.code); });
}

function initGame(){
  gamePhase = 'briefing';
  renderBriefing();
  setupKeys();
  setupRealtime();
}

const bgmEl = document.getElementById('bgm');
if(bgmEl){
  bgmEl.addEventListener('error', ()=>{
    console.warn('[BGM] BGM.mp3를 불러오지 못했습니다. 파일이 이 html과 같은 폴더에 있는지, 파일명 대소문자가 정확한지 확인해보세요.');
  });
  // cache-bust so a replaced BGM.mp3 is always fetched fresh instead of
  // reusing a stale (previously-broken) cached copy from the browser/CDN
  bgmEl.src = 'BGM.mp3?v=' + Date.now();
  bgmEl.load();
}

[['sfxJump','jump.mp3'], ['sfxOpen','open.mp3']].forEach(([id, file])=>{
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener('error', ()=>{
    console.warn(`[SFX] ${file}를 불러오지 못했습니다. html과 같은 폴더에 있는지 확인해보세요.`);
  });
  el.src = file + '?v=' + Date.now();
  el.load();
});

renderLogin();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
