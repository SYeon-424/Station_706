<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정거장 706: 마지막 신호</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b10;
    --panel:#0e131b;
    --line:#1c2530;
    --green:#4ade80;
    --green-dim:#2f6b47;
    --amber:#f5a524;
    --red:#e34848;
    --slate:#8a98a8;
    --white:#eef2f5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:'IBM Plex Mono',monospace;min-height:100%;}
  .scanlines{
    pointer-events:none;position:fixed;inset:0;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,0.025) 0px,rgba(255,255,255,0.025) 1px,transparent 1px,transparent 3px);
    mix-blend-mode:overlay;
  }
  .vignette{pointer-events:none;position:fixed;inset:0;z-index:49;box-shadow:inset 0 0 160px rgba(0,0,0,0.75);}
  #app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:28px 20px 60px;}
  h1,h2,h3{font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;margin:0;}
  .glow{color:var(--green);text-shadow:0 0 6px rgba(74,222,128,0.5);}
  .amber-glow{color:var(--amber);text-shadow:0 0 6px rgba(245,165,36,0.45);}
  .red-glow{color:var(--red);text-shadow:0 0 8px rgba(227,72,72,0.55);}
  .muted{color:var(--slate);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:16px;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;}
  input[type=text]{
    background:#0a0f16;border:1px solid var(--line);color:var(--green);
    font-family:'Share Tech Mono',monospace;font-size:16px;padding:10px 12px;border-radius:4px;
    width:100%;outline:none;
  }
  input[type=text]:focus{border-color:var(--green-dim);}
  button{
    background:transparent;border:1px solid var(--green-dim);color:var(--green);
    font-family:'IBM Plex Mono',monospace;font-weight:600;padding:10px 18px;border-radius:4px;
    cursor:pointer;transition:all .15s ease;letter-spacing:0.3px;
  }
  button:hover{background:rgba(74,222,128,0.1);border-color:var(--green);}
  button:disabled{opacity:0.4;cursor:not-allowed;}
  .row{display:flex;gap:10px;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .meter-wrap{display:flex;gap:20px;flex-wrap:wrap;}
  .meter{min-width:140px;}
  .meter-label{font-size:11px;color:var(--slate);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .meter-bar{height:6px;background:#1a222c;border-radius:3px;overflow:hidden;}
  .meter-fill{height:100%;transition:width .4s ease;}
  .vitals-fill{background:var(--green);}
  .presence-fill{background:var(--red);}
  .players{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;}
  .player-chip{border:1px solid var(--line);border-radius:12px;padding:4px 10px;display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--slate);}
  .dot.on{background:var(--green);box-shadow:0 0 5px var(--green);}
  .log-entry{border-left:2px solid var(--green-dim);padding:8px 12px;margin-bottom:10px;font-size:14px;line-height:1.6;color:#c7d1d9;}
  .log-entry .tag{color:var(--amber);font-size:11px;letter-spacing:1px;display:block;margin-bottom:4px;}
  .feedback{margin-top:10px;font-size:14px;min-height:20px;}
  .feedback.ok{color:var(--green);}
  .feedback.bad{color:var(--red);}
  .flicker{animation:flicker 0.15s linear 2;}
  @keyframes flicker{0%,100%{opacity:1;}50%{opacity:0.3;}}
  svg#pulse{width:100%;height:44px;display:block;}
  .hidden{display:none !important;}
  .ending-title{font-size:26px;margin-bottom:14px;}
  .small{font-size:12px;color:var(--slate);}
  a.link-reset{color:var(--slate);text-decoration:underline;cursor:pointer;font-size:12px;}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="vignette"></div>
<div id="app"></div>

<script>
const ROOM_PREFIX = "escape706:";
let myName = "";
let roomCode = "";
let pollTimer = null;
let heartbeatTimer = null;
let lastRenderedTick = null;

const LOGS = {
  0: {tag:"SYSTEM LOG // 00:00", text:"관측선 마고 3호, 표류 정거장 706 접근 완료. 정거장 내 생명반응 없음. 냉동캡슐 두 기, 원인 불명의 활성화 신호 감지됨. 산소 재순환 장치 가동 — 잔량 위험 수준."},
  1: {tag:"SYSTEM LOG // 캡슐 해제", text:"캡슐 표면 성에 사이로 긁힌 자국이 보인다. 누군가 손끝으로 남긴 숫자열: 2 · 6 · 12 · 20 · ?  — 해제 코드는 이 수열의 다음 숫자다."},
  2: {tag:"승무원 교신 기록 // 복구됨", text:"세 승무원의 마지막 위치 보고가 복구되었다.\n\n[김도윤] 03:14 기계실 → 03:20 격납고\n[박서연] 03:15 의무실 → 03:16 함교\n[이한결] 03:00 침실 → 04:00 침실\n\n정거장 설계도에 따르면 의무실과 함교 사이는 최단 도보로도 8분이 걸린다. 셋 중 이동 기록에 모순이 있는 사람의 이름을 입력하라."},
  3: {tag:"보안 기록 // 배지 대조", text:"모순이 발견된 인물의 사물함에서 배지가 발견됐다. 배지 번호: 07. 탈출 포드 잠금 해제 코드는 [캡슐 해제 코드] 뒤에 [배지 번호]를 이어붙인 4자리 숫자다."}
};

function defaultState(){
  return {
    stage: 1,
    vitals: 100,
    presence: 0,
    wrongAttempts: 0,
    revealedLogs: [0,1],
    solved: {1:false,2:false,3:false},
    ending: null,
    players: {},
    updatedAt: Date.now()
  };
}

async function loadState(){
  try{
    const res = await window.storage.get(ROOM_PREFIX + roomCode, true);
    if(!res) return defaultState();
    return JSON.parse(res.value);
  }catch(e){
    return defaultState();
  }
}

async function saveState(state){
  state.updatedAt = Date.now();
  try{
    await window.storage.set(ROOM_PREFIX + roomCode, JSON.stringify(state), true);
  }catch(e){
    console.error("저장 실패", e);
  }
  return state;
}

async function mutateState(fn){
  const state = await loadState();
  const next = fn(state) || state;
  return await saveState(next);
}

function isOnline(ts){
  return ts && (Date.now() - ts) < 9000;
}

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="center">
      <h1 class="glow" style="font-size:30px;">정거장 706</h1>
      <div class="muted" style="margin-bottom:26px;letter-spacing:1px;">마지막 신호 — 협동 방탈출</div>
      <div class="card" style="width:100%;max-width:380px;text-align:left;">
        <div class="small" style="margin-bottom:6px;">닉네임</div>
        <input type="text" id="nameInput" placeholder="예: 도윤" style="margin-bottom:14px;">
        <div class="small" style="margin-bottom:6px;">방 코드 (친구와 동일하게 입력)</div>
        <input type="text" id="roomInput" placeholder="예: NEBULA7">
        <button id="enterBtn" style="width:100%;margin-top:16px;">캡슐 접속</button>
      </div>
      <div class="small" style="max-width:380px;">같은 방 코드로 친구와 각자 접속하면 화면이 실시간으로 동기화됩니다.</div>
    </div>
  `;
  document.getElementById('enterBtn').onclick = async ()=>{
    const n = document.getElementById('nameInput').value.trim();
    const r = document.getElementById('roomInput').value.trim().toUpperCase();
    if(!n || !r){ return; }
    myName = n;
    roomCode = r;
    await mutateState(s=>{ s.players[myName] = {lastSeen: Date.now()}; return s; });
    startGame();
  };
}

function pulseSVG(presence){
  const danger = presence >= 60;
  const color = danger ? "var(--red)" : "var(--green)";
  const jitter = danger ? 6 : 1;
  let d = "M0,22 ";
  for(let x=0;x<=700;x+=20){
    const spike = (x/20)%5===0 ? (danger ? 18+Math.random()*jitter : 14) : 0;
    const dir = ((x/20)%2===0) ? -1 : 1;
    d += `L${x},${22 + dir*spike} `;
  }
  return `<svg id="pulse" viewBox="0 0 700 44" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>
  </svg>`;
}

async function renderGame(){
  const state = await loadState();
  if(!state.players[myName]) state.players[myName] = {lastSeen: Date.now()};
  lastRenderedTick = state.updatedAt;

  if(state.ending){
    renderEnding(state);
    return;
  }

  const app = document.getElementById('app');
  const playersHtml = Object.entries(state.players).map(([name,info])=>{
    return `<div class="player-chip"><span class="dot ${isOnline(info.lastSeen)?'on':''}"></span>${escapeHtml(name)}</div>`;
  }).join('');

  const logsHtml = state.revealedLogs.sort((a,b)=>a-b).map(id=>{
    const l = LOGS[id];
    return `<div class="log-entry"><span class="tag">${l.tag}</span>${l.text.replace(/\n/g,'<br>')}</div>`;
  }).join('');

  let stageBlock = "";
  if(state.stage === 1){
    stageBlock = stagePrompt("각성", "캡슐 해제 코드를 입력하라.", "코드 입력", "stage1");
  } else if(state.stage === 2){
    stageBlock = stagePrompt("모순의 로그", "이동 기록에 모순이 있는 인물의 이름을 입력하라.", "이름 입력", "stage2");
  } else if(state.stage === 3){
    stageBlock = stagePrompt("탈출", "탈출 포드 잠금 해제 코드(4자리)를 입력하라.", "코드 입력", "stage3");
  }

  app.innerHTML = `
    <div class="top-bar">
      <div>
        <h2 class="glow">정거장 706</h2>
        <div class="small">ROOM ${escapeHtml(roomCode)} · 단계 ${state.stage}/3</div>
      </div>
      <div class="meter-wrap">
        <div class="meter">
          <div class="meter-label">산소 / VITALS</div>
          <div class="meter-bar"><div class="meter-fill vitals-fill" style="width:${state.vitals}%;"></div></div>
        </div>
        <div class="meter">
          <div class="meter-label">이상 신호 / PRESENCE</div>
          <div class="meter-bar"><div class="meter-fill presence-fill" style="width:${state.presence}%;"></div></div>
        </div>
      </div>
    </div>
    <div class="players" style="margin-bottom:18px;">${playersHtml}</div>
    ${pulseSVG(state.presence)}
    <div class="card" style="margin-top:16px;">
      <h3 class="amber-glow" style="font-size:14px;letter-spacing:1px;margin-bottom:10px;">기록 보관소</h3>
      ${logsHtml}
    </div>
    <div class="card">${stageBlock}</div>
    <a class="link-reset" id="resetLink">방 초기화</a>
  `;

  wireStage(state.stage);
  document.getElementById('resetLink').onclick = async ()=>{
    if(confirm("정말 이 방의 진행 상황을 초기화할까요?")){
      await saveState(defaultState());
      render();
    }
  };
}

function stagePrompt(title, desc, placeholder, id){
  return `
    <h3 class="glow" style="margin-bottom:6px;">${title}</h3>
    <div class="muted" style="margin-bottom:14px;font-size:14px;">${desc}</div>
    <div class="row">
      <input type="text" id="${id}Input" placeholder="${placeholder}">
      <button id="${id}Btn">확인</button>
    </div>
    <div class="feedback" id="${id}Feedback"></div>
  `;
}

function wireStage(stage){
  if(stage === 1){
    document.getElementById('stage1Btn').onclick = ()=>submitAnswer('30', LOGS_AFTER_1, 2);
    document.getElementById('stage1Input').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAnswer('30', LOGS_AFTER_1, 2); });
  } else if(stage === 2){
    document.getElementById('stage2Btn').onclick = ()=>submitAnswer('박서연', LOGS_AFTER_2, 3);
    document.getElementById('stage2Input').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAnswer('박서연', LOGS_AFTER_2, 3); });
  } else if(stage === 3){
    document.getElementById('stage3Btn').onclick = ()=>submitFinal('3007');
    document.getElementById('stage3Input').addEventListener('keydown', e=>{ if(e.key==='Enter') submitFinal('3007'); });
  }
}

const LOGS_AFTER_1 = 2;
const LOGS_AFTER_2 = 3;

async function submitAnswer(correct, nextLogId, nextStage){
  const inputId = nextStage === 2 ? 'stage1Input' : 'stage2Input';
  const fbId = nextStage === 2 ? 'stage1Feedback' : 'stage2Feedback';
  const val = document.getElementById(inputId).value.trim();
  const fb = document.getElementById(fbId);
  if(val.replace(/\s/g,'') === correct){
    fb.textContent = "일치 확인. 다음 기록이 해제됩니다.";
    fb.className = "feedback ok";
    await mutateState(s=>{
      s.stage = nextStage;
      if(!s.revealedLogs.includes(nextLogId)) s.revealedLogs.push(nextLogId);
      return s;
    });
    render();
  } else {
    fb.textContent = "불일치. 이상 신호가 증가합니다.";
    fb.className = "feedback bad flicker";
    await mutateState(s=>{
      s.wrongAttempts += 1;
      s.vitals = Math.max(0, s.vitals - 6);
      s.presence = Math.min(100, s.presence + 15);
      return s;
    });
    setTimeout(render, 350);
  }
}

async function submitFinal(correct){
  const val = document.getElementById('stage3Input').value.trim();
  const fb = document.getElementById('stage3Feedback');
  if(val.replace(/\s/g,'') === correct){
    const state = await loadState();
    const ending = state.presence >= 60 ? 'BAD' : 'GOOD';
    await mutateState(s=>{ s.ending = ending; return s; });
    render();
  } else {
    fb.textContent = "코드가 맞지 않는다. 포드가 잠긴 채로 경고음이 울린다.";
    fb.className = "feedback bad flicker";
    await mutateState(s=>{
      s.wrongAttempts += 1;
      s.vitals = Math.max(0, s.vitals - 6);
      s.presence = Math.min(100, s.presence + 15);
      return s;
    });
    setTimeout(render, 350);
  }
}

function renderEnding(state){
  const app = document.getElementById('app');
  if(state.ending === 'GOOD'){
    app.innerHTML = `
      <div class="center">
        <h1 class="ending-title glow">탈출 포드, 발사</h1>
        <div class="card" style="max-width:560px;text-align:left;line-height:1.8;">
          포드가 정거장 706에서 떨어져 나간다. 뒤를 돌아보니 격납고 조명이 하나둘 꺼지고 있었다.
          박서연의 배지는 여전히 손에 쥐어져 있었지만, 그녀의 위치 기록이 왜 모순됐는지는 끝내 알 수 없었다.
          구조 신호가 잡히기 시작한다. 산소는 아슬아슬하게 남아있다.<br><br>
          <span class="muted">— 생존. 하지만 정거장에 무엇이 있었는지는 기록되지 않았다.</span>
        </div>
      </div>
    `;
  } else {
    app.innerHTML = `
      <div class="center">
        <h1 class="ending-title red-glow flicker">신호, 끊김</h1>
        <div class="card" style="max-width:560px;text-align:left;line-height:1.8;">
          포드 문이 열리는 순간, 함께 있던 동료의 얼굴에 옅은 미소가 스친다 — 지금까지 한 번도 짓지 않았던 표정.
          "우리 둘뿐이었잖아, 그렇지?" 목소리는 익숙했지만, 억양의 리듬이 미묘하게 어긋나 있었다.
          이상 신호 수치가 계속 남아있던 이유를 이제야 알 것 같다.<br><br>
          <span class="muted red-glow">— 마고 3호와의 교신이 끊겼습니다.</span>
        </div>
      </div>
    `;
  }
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){ renderGame(); }

function startGame(){
  render();
  heartbeatTimer = setInterval(async ()=>{
    await mutateState(s=>{ s.players[myName] = {lastSeen: Date.now()}; return s; });
  }, 5000);
  pollTimer = setInterval(async ()=>{
    const s = await loadState();
    if(s.updatedAt !== lastRenderedTick){
      render();
    }
  }, 2000);
}

renderLogin();
</script>
</body>
</html>
