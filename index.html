<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정거장 706: 협동 플랫포머</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080b10; --panel:#0e131b; --line:#1c2530;
    --green:#4ade80; --green-dim:#2f6b47; --amber:#f5a524; --red:#e34848;
    --slate:#8a98a8; --white:#eef2f5; --p1:#4ade80; --p2:#f5a524;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);font-family:'IBM Plex Mono',monospace;min-height:100%;}
  #app{position:relative;max-width:860px;margin:0 auto;padding:24px 16px 50px;}
  h1,h2,h3{font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;margin:0;}
  .glow{color:var(--green);text-shadow:0 0 6px rgba(74,222,128,0.5);}
  .amber-glow{color:var(--amber);}
  .muted{color:var(--slate);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:14px;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;}
  input[type=text]{
    background:#0a0f16;border:1px solid var(--line);color:var(--green);
    font-family:'Share Tech Mono',monospace;font-size:16px;padding:10px 12px;border-radius:4px;
    width:100%;outline:none;
  }
  button{
    background:transparent;border:1px solid var(--green-dim);color:var(--green);
    font-family:'IBM Plex Mono',monospace;font-weight:600;padding:10px 18px;border-radius:4px;
    cursor:pointer;transition:all .15s ease;
  }
  button:hover{background:rgba(74,222,128,0.1);border-color:var(--green);}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .players{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;}
  .player-chip{border:1px solid var(--line);border-radius:12px;padding:4px 10px;display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;}
  .small{font-size:12px;color:var(--slate);}
  a.link-reset{color:var(--slate);text-decoration:underline;cursor:pointer;font-size:12px;}
  canvas{width:100%;display:block;background:#060911;border-radius:6px;border:1px solid var(--line);}
  .controls-hint{margin-top:10px;font-size:12px;color:var(--slate);text-align:center;}
  .clear-banner{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(8,11,16,0.92);border:1px solid var(--green);color:var(--green);
    padding:20px 34px;border-radius:8px;font-family:'Share Tech Mono',monospace;font-size:22px;
    text-shadow:0 0 8px rgba(74,222,128,0.6);letter-spacing:1px;text-align:center;
  }
  .canvas-wrap{position:relative;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const ROOM_PREFIX = "coopplat706:";
let myName = "";
let roomCode = "";
let canvas, ctx;
let rafId = null;
let netWriteTimer = null;
let netReadTimer = null;
let lastRemoteSnapshots = {}; // name -> [{x,y,t}, {x,y,t}] for interpolation
let keys = new Set();

const GRAVITY = 0.65;
const JUMP_V = -11.5;
const MOVE_SPEED = 3.4;
const PW = 22, PH = 30; // player box size
const LEVEL = { w: 800, h: 400 };

// Static platforms (never change)
const STATIC_PLATFORMS = [
  {x:0,y:340,w:260,h:60},      // left ground
  {x:460,y:340,w:340,h:60},    // right ground
  {x:80,y:320,w:60,h:10, tag:'switch'},   // switch pad (visual only, sits on ground)
  {x:500,y:320,w:44,h:10, tag:'plateA'},
  {x:620,y:320,w:44,h:10, tag:'plateB'},
];
const BRIDGE = {x:260,y:340,w:200,h:20};
const GATE_X = 760; // goal gate x position (right edge)
const PIT_Y = 385;
const START_POS = {x:40,y:290};

function defaultState(){
  return {
    players: {},
    switchOn: false,
    gateOpen: false,
    cleared: false,
    updatedAt: Date.now()
  };
}

async function loadState(){
  try{
    const res = await window.storage.get(ROOM_PREFIX + roomCode, true);
    if(!res) return defaultState();
    return JSON.parse(res.value);
  }catch(e){ return defaultState(); }
}
async function saveState(state){
  state.updatedAt = Date.now();
  try{ await window.storage.set(ROOM_PREFIX + roomCode, JSON.stringify(state), true); }
  catch(e){ /* ignore transient failures */ }
  return state;
}
async function mutateState(fn){
  const s = await loadState();
  const next = fn(s) || s;
  return await saveState(next);
}
function isOnline(ts){ return ts && (Date.now()-ts) < 6000; }
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- LOGIN ----------
function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="center">
      <h1 class="glow" style="font-size:28px;">정거장 706: 협동 플랫포머</h1>
      <div class="muted" style="margin-bottom:24px;">둘이 같이 다리를 놓고, 같이 발판을 밟아 문을 열어라.</div>
      <div class="card" style="width:100%;max-width:380px;text-align:left;">
        <div class="small" style="margin-bottom:6px;">닉네임</div>
        <input type="text" id="nameInput" placeholder="예: 도윤" style="margin-bottom:14px;">
        <div class="small" style="margin-bottom:6px;">방 코드 (친구와 동일하게)</div>
        <input type="text" id="roomInput" placeholder="예: NEBULA7">
        <button id="enterBtn" style="width:100%;margin-top:16px;">입장</button>
      </div>
    </div>
  `;
  document.getElementById('enterBtn').onclick = async ()=>{
    const n = document.getElementById('nameInput').value.trim();
    const r = document.getElementById('roomInput').value.trim().toUpperCase();
    if(!n || !r) return;
    myName = n; roomCode = r;
    startGame();
  };
}

// ---------- GAME SHELL ----------
let myPlayer = { x: START_POS.x, y: START_POS.y, vx:0, vy:0, onGround:false, color: '#4ade80' };
let sharedSnapshot = null; // last full state fetched

function renderShell(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="top-bar">
      <div><h2 class="glow" style="font-size:18px;">정거장 706</h2><div class="small">ROOM ${escapeHtml(roomCode)}</div></div>
      <div class="players" id="playerChips"></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="${LEVEL.w}" height="${LEVEL.h}"></canvas>
      <div id="clearBanner"></div>
    </div>
    <div class="controls-hint">← → 이동 · Space / ↑ 점프 &nbsp;|&nbsp; 왼쪽 발판(스위치)을 밟아 다리를 올리고, 오른쪽 두 발판을 둘이 동시에 밟아 문을 열어라</div>
    <a class="link-reset" id="resetLink" style="display:block;text-align:center;margin-top:10px;">방 초기화</a>
  `;
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  document.getElementById('resetLink').onclick = async ()=>{
    if(confirm("이 방을 초기화할까요?")){ await saveState(defaultState()); }
  };
}

function updatePlayerChips(state){
  const chips = document.getElementById('playerChips');
  if(!chips) return;
  const names = Object.keys(state.players);
  chips.innerHTML = names.map(name=>{
    const info = state.players[name];
    const c = name === myName ? '#4ade80' : '#f5a524';
    return `<div class="player-chip"><span class="dot" style="background:${c};box-shadow:0 0 5px ${c};opacity:${isOnline(info.lastSeen)?1:0.3}"></span>${escapeHtml(name)}</div>`;
  }).join('');
}

// ---------- PHYSICS ----------
function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function getActivePlatforms(state){
  const plats = STATIC_PLATFORMS.filter(p=>!p.tag || p.tag==='ground');
  // ground platforms without tag are solid; switch/plate pads are thin solid too (standable)
  const solids = [
    {x:0,y:340,w:260,h:60},
    {x:460,y:340,w:340,h:60},
    {x:80,y:320,w:60,h:10},
    {x:500,y:320,w:44,h:10},
    {x:620,y:320,w:44,h:10},
  ];
  if(state.switchOn) solids.push(BRIDGE);
  return solids;
}

function stepPhysics(state, dt){
  const p = myPlayer;
  // horizontal input
  let moveX = 0;
  if(keys.has('ArrowLeft')||keys.has('KeyA')) moveX -= 1;
  if(keys.has('ArrowRight')||keys.has('KeyD')) moveX += 1;
  p.vx = moveX * MOVE_SPEED;

  if((keys.has('Space')||keys.has('ArrowUp')||keys.has('KeyW')) && p.onGround){
    p.vy = JUMP_V;
    p.onGround = false;
  }

  p.vy += GRAVITY;
  if(p.vy > 14) p.vy = 14;

  const solids = getActivePlatforms(state);
  const box = ()=>({x:p.x-PW/2, y:p.y-PH, w:PW, h:PH});

  // move X
  p.x += p.vx;
  let b = box();
  for(const s of solids){
    if(rectsOverlap(b,s)){
      if(p.vx > 0) p.x = s.x - PW/2;
      else if(p.vx < 0) p.x = s.x + s.w + PW/2;
      b = box();
    }
  }
  // move Y
  p.y += p.vy;
  b = box();
  p.onGround = false;
  for(const s of solids){
    if(rectsOverlap(b,s)){
      if(p.vy > 0){ p.y = s.y; p.onGround = true; p.vy = 0; }
      else if(p.vy < 0){ p.y = s.y + s.h + PH; p.vy = 0; }
      b = box();
    }
  }

  // fell into pit
  if(p.y > PIT_Y + 40){
    p.x = START_POS.x; p.y = START_POS.y; p.vx = 0; p.vy = 0;
  }

  // clamp to level bounds
  if(p.x < PW/2) p.x = PW/2;
  if(p.x > LEVEL.w - PW/2) p.x = LEVEL.w - PW/2;
}

function onSwitchPad(){
  const p = myPlayer;
  return p.x > 80 && p.x < 140 && p.y >= 315 && p.y <= 325;
}
function onPlateA(){ const p = myPlayer; return p.x > 500 && p.x < 544 && p.y >= 315 && p.y <= 325; }
function onPlateB(){ const p = myPlayer; return p.x > 620 && p.x < 664 && p.y >= 315 && p.y <= 325; }

// ---------- RENDER ----------
function drawLevel(state, remotePositions){
  ctx.clearRect(0,0,LEVEL.w,LEVEL.h);
  // background grid
  ctx.strokeStyle = 'rgba(74,222,128,0.05)';
  for(let x=0;x<LEVEL.w;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,LEVEL.h); ctx.stroke(); }

  // pit glow
  ctx.fillStyle = '#0a0208';
  ctx.fillRect(260,340,200,60);

  // static ground
  ctx.fillStyle = '#141b24';
  ctx.strokeStyle = '#2f6b47';
  ctx.lineWidth = 1.5;
  [{x:0,y:340,w:260,h:60},{x:460,y:340,w:340,h:60}].forEach(r=>{
    ctx.fillRect(r.x,r.y,r.w,r.h); ctx.strokeRect(r.x,r.y,r.w,r.h);
  });

  // bridge (if active)
  if(state.switchOn){
    ctx.fillStyle = 'rgba(74,222,128,0.18)';
    ctx.strokeStyle = '#4ade80';
    ctx.fillRect(BRIDGE.x,BRIDGE.y,BRIDGE.w,BRIDGE.h);
    ctx.strokeRect(BRIDGE.x,BRIDGE.y,BRIDGE.w,BRIDGE.h);
  } else {
    ctx.strokeStyle = 'rgba(245,165,36,0.4)';
    ctx.setLineDash([4,4]);
    ctx.strokeRect(BRIDGE.x,BRIDGE.y,BRIDGE.w,BRIDGE.h);
    ctx.setLineDash([]);
  }

  // switch pad
  ctx.fillStyle = state.switchOn ? '#4ade80' : '#f5a524';
  ctx.fillRect(80,320,60,10);
  ctx.fillStyle = '#c7d1d9';
  ctx.font = '9px monospace';
  ctx.fillText('SWITCH', 84, 316);

  // plates
  ctx.fillStyle = state.gateOpen ? '#4ade80' : '#f5a524';
  ctx.fillRect(500,320,44,10);
  ctx.fillRect(620,320,44,10);
  ctx.fillStyle = '#c7d1d9';
  ctx.fillText('PLATE A', 496, 316);
  ctx.fillText('PLATE B', 616, 316);

  // gate
  ctx.fillStyle = state.gateOpen ? 'rgba(74,222,128,0.15)' : 'rgba(227,72,72,0.25)';
  ctx.fillRect(GATE_X, 260, 12, 80);
  ctx.strokeStyle = state.gateOpen ? '#4ade80' : '#e34848';
  ctx.strokeRect(GATE_X, 260, 12, 80);

  // remote players (interpolated)
  Object.entries(remotePositions).forEach(([name,pos])=>{
    drawPlayer(pos.x, pos.y, '#f5a524', name);
  });

  // my player
  drawPlayer(myPlayer.x, myPlayer.y, '#4ade80', myName);
}

function drawPlayer(x,y,color,label){
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  ctx.fillRect(x-PW/2, y-PH, PW, PH);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#050810';
  ctx.fillRect(x-6, y-PH+8, 4,4);
  ctx.fillRect(x+2, y-PH+8, 4,4);
  ctx.fillStyle = '#c7d1d9';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y-PH-6);
  ctx.textAlign = 'left';
}

function getInterpolatedRemotePositions(){
  const now = Date.now();
  const out = {};
  Object.entries(lastRemoteSnapshots).forEach(([name, snaps])=>{
    if(snaps.length === 0) return;
    if(snaps.length === 1){ out[name] = snaps[0]; return; }
    const [a,b] = snaps;
    const span = b.t - a.t || 1;
    let t = (now - b.t) / span + 1; // extrapolate slightly forward
    t = Math.max(0, Math.min(1.4, t));
    out[name] = { x: a.x + (b.x-a.x)*t, y: a.y + (b.y-a.y)*t };
  });
  return out;
}

// ---------- GAME LOOP ----------
function gameLoop(){
  const state = sharedSnapshot || defaultState();
  stepPhysics(state);

  // local switch/plate logic (optimistic, then confirmed via shared state)
  if(onSwitchPad() && !state.switchOn){
    state.switchOn = true;
    mutateState(s=>{ s.switchOn = true; return s; });
  }

  const remote = getInterpolatedRemotePositions();
  const remoteNames = Object.keys(remote);
  let iAmOnA = onPlateA(), iAmOnB = onPlateB();
  let otherOnA = false, otherOnB = false;
  remoteNames.forEach(name=>{
    const pos = remote[name];
    if(pos.x>500 && pos.x<544 && pos.y>=310 && pos.y<=330) otherOnA = true;
    if(pos.x>620 && pos.x<664 && pos.y>=310 && pos.y<=330) otherOnB = true;
  });
  const bothPlatesCovered = (iAmOnA || otherOnA) && (iAmOnB || otherOnB) && (
    (iAmOnA && otherOnB) || (iAmOnB && otherOnA)
  );
  if(bothPlatesCovered && !state.gateOpen){
    state.gateOpen = true;
    mutateState(s=>{ s.gateOpen = true; return s; });
  }

  const cleared = state.gateOpen && myPlayer.x > GATE_X - 4;
  const banner = document.getElementById('clearBanner');
  if(banner) banner.innerHTML = cleared ? `<div class="clear-banner">CLEAR!<br><span style="font-size:12px;color:#8a98a8;">함께 탈출했다</span></div>` : '';

  drawLevel(state, remote);
  rafId = requestAnimationFrame(gameLoop);
}

// ---------- NETWORKING ----------
function startNetworking(){
  netWriteTimer = setInterval(async ()=>{
    await mutateState(s=>{
      s.players[myName] = { x: Math.round(myPlayer.x), y: Math.round(myPlayer.y), lastSeen: Date.now() };
      return s;
    });
  }, 220);

  netReadTimer = setInterval(async ()=>{
    const s = await loadState();
    sharedSnapshot = s;
    updatePlayerChips(s);
    Object.entries(s.players).forEach(([name, info])=>{
      if(name === myName) return;
      const t = Date.now();
      if(!lastRemoteSnapshots[name]) lastRemoteSnapshots[name] = [];
      const arr = lastRemoteSnapshots[name];
      arr.push({x:info.x, y:info.y, t});
      if(arr.length > 2) arr.shift();
    });
  }, 220);
}

function setupKeys(){
  window.addEventListener('keydown', e=>{
    if(['ArrowLeft','ArrowRight','ArrowUp','Space','KeyA','KeyD','KeyW'].includes(e.code)) e.preventDefault();
    keys.add(e.code);
  });
  window.addEventListener('keyup', e=>{ keys.delete(e.code); });
}

async function startGame(){
  renderShell();
  setupKeys();
  sharedSnapshot = await loadState();
  updatePlayerChips(sharedSnapshot);
  startNetworking();
  gameLoop();
}

renderLogin();
</script>
</body>
</html>
